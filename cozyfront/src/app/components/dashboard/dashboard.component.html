<!-- Archivo: src/app/components/dashboard/dashboard.component.html -->

<div class="banner">
  <h1>Gestión Inteligente de <span class="resaltado">Propiedades</span></h1>
  <p>Administra tu inventario inmobiliario con herramientas avanzadas de análisis y valoración.</p>
  <button>Ver Propiedades</button>
</div>

<div class="section">
  <h2>Propiedades Recientes</h2>
  <div class="cards-container">
    <div *ngFor="let prop of properties" class="property-card">
      <h3>{{ prop.title }}</h3>
      <p>{{ prop.address }}</p>
      <p><strong>Precio:</strong> USD {{ prop.price }}</p>
      <p><strong>{{ prop.rooms }} habitaciones, {{ prop.bathrooms }} baños</strong></p>
      <p><strong>{{ prop.area }} m²</strong></p>
    </div>
  </div>
</div>
